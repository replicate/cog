[workspace]
resolver = "2"
members = ["coglet", "coglet-core", "coglet-http", "coglet-python"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/replicate/cog"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP server
axum = "0.8"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Python bindings
pyo3 = { version = "0.27", features = ["auto-initialize", "abi3-py310"] }
pyo3-async-runtimes = { version = "0.27", features = ["tokio-runtime"] }

# Testing
insta = { version = "1", features = ["json"] }

# Internal crates
coglet-core = { path = "coglet-core" }
coglet-http = { path = "coglet-http" }
