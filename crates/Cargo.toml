[workspace]
resolver = "2"
members = ["coglet", "coglet-core", "coglet-transport", "coglet-python", "coglet-worker"]
# coglet-python requires maturin, exclude from default workspace operations
default-members = ["coglet", "coglet-core", "coglet-transport", "coglet-worker"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/replicate/cog"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"

# HTTP server
axum = "0.8"

# HTTP client
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Python bindings
pyo3 = { version = "0.27", features = ["auto-initialize", "abi3-py310"] }
pyo3-async-runtimes = { version = "0.27", features = ["tokio-runtime"] }

# Testing
insta = { version = "1", features = ["json"] }

# Internal crates
coglet-core = { path = "coglet-core" }
coglet-transport = { path = "coglet-transport" }
