# Activate venv for Python 3.10+
[env]
_.python.venv = ".venv"

[tasks.build-rust]
description = "Build Rust crates"
run = "cargo build --manifest-path crates/Cargo.toml --workspace"

[tasks.build-rust-release]
description = "Build Rust crates (release)"
run = "cargo build --manifest-path crates/Cargo.toml --workspace --release"

[tasks.test-rust]
description = "Run Rust tests"
run = "cargo test --manifest-path crates/Cargo.toml --workspace"

[tasks.lint-rust]
description = "Lint Rust code"
run = "cargo clippy --manifest-path crates/Cargo.toml --workspace -- -D warnings"

[tasks.fmt-rust]
description = "Format Rust code"
run = "cargo fmt --manifest-path crates/Cargo.toml --all"

[tasks.fmt-rust-check]
description = "Check Rust formatting"
run = "cargo fmt --manifest-path crates/Cargo.toml --all -- --check"

[tasks.build-coglet]
description = "Build coglet Python wheel (development)"
run = "cd crates/coglet-python && maturin develop"
