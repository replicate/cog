# Cog Model Test Manifest
# =======================
# Each entry defines a model to test, its inputs, and expected outputs.
#
# Input values prefixed with "@" are resolved as fixture file paths relative
# to the fixtures/ directory (e.g. "@test_image.png" -> fixtures/test_image.png).
#
# Validation types:
#   exact       - output string must equal `value` exactly
#   contains    - output string must contain `value` as a substring
#   regex       - output string must match `pattern`
#   file_exists - output is a file path; optionally check `mime` type
#   json_match  - parse output as JSON, assert `match` is a subset
#   json_keys   - parse output as JSON dict, assert it has entries
#   not_empty   - output is non-empty (loose smoke test)
#
# Setup commands:
#   Optional `setup` list of shell commands to run after cloning the repo
#   but before building. Useful for models that generate cog.yaml from
#   templates or need other preparation steps.
#   Example:
#     setup:
#       - "script/select.sh dev"
#
# Required tools:
#   Optional `requires_tools` list of CLI tools that must be on PATH for
#   setup commands to work. The harness checks before running and prints
#   install instructions for known tools (yq, envsubst).
#   Example:
#     requires_tools: ["yq"]
#
# Model resolution (base_dir takes priority over repo):
#   - Set `base_dir` for local models -- `path` is resolved under it. A
#     relative `base_dir` is resolved against the repo root; an absolute path
#     is used as-is. Local only; never clones.
#   - Set `repo: owner/name` (with no `base_dir`) to clone from GitHub.
#   - Set neither to default to fixtures/models/ (local fixtures).
#   `repo: local` is no longer supported -- use `base_dir` instead.

defaults:
  sdk_version: "latest"          # "latest" = newest stable from PyPI; or pin e.g. "0.16.12"
  cog_version: "latest"          # "latest" = newest stable release; or pin e.g. "v0.16.12"

models:
  # ── cog-examples (CPU) ──────────────────────────────────────────────

  - name: hello-world
    base_dir: examples
    path: hello-world
    gpu: false
    tests:
      - description: "basic predict"
        inputs:
          text: "world"
        expect:
          type: exact
          value: "hello world"

  - name: canary
    base_dir: examples
    path: canary
    gpu: false
    tests:
      - description: "streaming concatenate iterator"
        inputs:
          text: "friend"
        expect:
          type: contains
          value: "friend"

  - name: blur
    base_dir: examples
    path: blur
    gpu: false
    tests:
      - description: "blur an image"
        inputs:
          image: "@test_image.png"
          blur: 5
        expect:
          type: file_exists
          mime: "image/png"

  - name: hello-image
    base_dir: examples
    path: hello-image
    gpu: false
    tests:
      - description: "return a static image"
        inputs: {}
        expect:
          type: file_exists

  - name: hello-concurrency
    base_dir: examples
    path: hello-concurrency
    gpu: false
    tests:
      - description: "async streaming output"
        inputs:
          total: 3
          interval: 0
        expect:
          type: contains
          value: "Apple"

  - name: hello-context
    base_dir: examples
    path: hello-context
    gpu: false
    # NOTE: This model uses current_scope().context which may not be
    # available in coglet yet. A failure here is a real compatibility signal.
    tests:
      - description: "returns input and context"
        inputs:
          text: "testing"
        expect:
          type: json_match
          match:
            inputs:
              text: "testing"

  - name: hello-train
    base_dir: examples
    path: hello-train
    gpu: false
    train_tests:
      - description: "train produces weights file"
        inputs:
          prefix: "custom"
        expect:
          type: not_empty
    tests:
      - description: "predict with default weights"
        inputs:
          text: "world"
        expect:
          type: contains
          value: "world"

  - name: notebook
    base_dir: examples
    path: notebook
    gpu: false
    tests:
      - description: "basic predict"
        inputs:
          name: "world"
        expect:
          type: contains
          value: "hello"

  - name: managed-weights
    base_dir: examples
    path: managed-weights
    gpu: false
    requires_env:
      - COG_MANAGED_WEIGHTS_READY
    tests:
      - description: "weight validation smoke test"
        inputs: {}
        expect:
          type: not_empty

  - name: streaming-text
    base_dir: examples
    path: streaming-text
    gpu: false
    tests:
      - description: "streaming text generation"
        inputs:
          prompt: "Hello"
        expect:
          type: not_empty

  # ── cog-examples (GPU) ──────────────────────────────────────────────

  - name: resnet
    base_dir: examples
    path: resnet
    gpu: true
    tests:
      - description: "classify hotdog image"
        inputs:
          image: "@hotdog.png"
        expect:
          type: json_keys

  - name: z-image-turbo
    base_dir: examples
    path: z-image-turbo
    gpu: true
    timeout: 600
    tests:
      - description: "generate image from prompt"
        inputs:
          prompt: "a cat sitting on a windowsill"
        expect:
          type: file_exists
          mime: "image/png"

  # ── Local fixture models ─────────────────────────────────────────────
  # These set base_dir to the fixtures dir (relative to the repo root), so
  # path is relative to it. They cover the full input type matrix for build
  # and prediction testing.

  - name: fixture-scalar-types
    base_dir: tools/test-harness/fixtures/models
    path: scalar-types
    gpu: false
    tests:
      - description: "basic scalar inputs"
        inputs:
          text: "hello"
        expect:
          type: contains
          value: "hello"

  - name: fixture-optional-types
    base_dir: tools/test-harness/fixtures/models
    path: optional-types
    gpu: false
    tests:
      - description: "optional inputs default to None"
        inputs:
          text: "hello"
        expect:
          type: exact
          value: "hello"

  - name: fixture-list-types
    base_dir: tools/test-harness/fixtures/models
    path: list-types
    gpu: false

  - name: fixture-optional-list-types
    base_dir: tools/test-harness/fixtures/models
    path: optional-list-types
    gpu: false
    tests:
      - description: "optional lists default to None"
        inputs:
          text: "hello"
        expect:
          type: exact
          value: "hello"

  - name: fixture-constraints-and-choices
    base_dir: tools/test-harness/fixtures/models
    path: constraints-and-choices
    gpu: false
    tests:
      - description: "defaults with constraints and choices"
        inputs: {}
        expect:
          type: exact
          value: "hello-0.7-50-balanced-1"

  - name: fixture-file-path-types
    base_dir: tools/test-harness/fixtures/models
    path: file-path-types
    gpu: false

  - name: fixture-complex-output
    base_dir: tools/test-harness/fixtures/models
    path: complex-output
    gpu: false
    tests:
      - description: "structured BaseModel output"
        inputs:
          prompt: "test"
        expect:
          type: json_match
          match:
            text: "generated: test"
            score: 0.95

  # ── External models (add your own below) ────────────────────────────
