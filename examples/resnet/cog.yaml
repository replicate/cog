# ResNet50 image classifier using torchvision's bundled weights.
#
# Weights ship with torchvision and download at setup time, so there's
# nothing to import -- just build and run.
#
# Build and push:
#   cog push

build:
  gpu: true
  python_version: "3.12"
  python_requirements: requirements.txt

run: "run.py:Runner"
