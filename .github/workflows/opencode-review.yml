name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest

    # Skip if label or title says so
    if: |
      !contains(github.event.pull_request.labels.*.name, 'no-ai-review') &&
      !contains(github.event.pull_request.title, '[skip-review]') &&
      !contains(github.event.pull_request.title, '[wip]') &&
      !contains(github.event.pull_request.title, '[WIP]')

    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run OpenCode Review
        uses: anomalyco/opencode/github@latest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_GATEWAY_BASE_URL: https://gateway.ai.cloudflare.com/v1/${{ vars.CLOUDFLARE_ACCOUNT_ID }}/${{ vars.CLOUDFLARE_GATEWAY_ID }}/compat
        with:
          model: cf-gateway/kimi-k2.5
          agent: reviewer
          prompt: |
            Review this pull request. Focus on what matters:
            - Bugs, logic errors, race conditions
            - Security issues
            - Performance concerns
            - Architectural fit with existing patterns
            - Error handling gaps

            Be practical. This repo has Go, Python, and Rust -- linters (golangci-lint,
            ruff, clippy) already run in CI, so don't flag formatting or style issues
            they catch.

            Scope your review to the PR's intent. Don't pile on about pre-existing
            issues unrelated to this change. Leave things better than you found them,
            but keep the burden proportional.

            Use file:line references. Use ```suggestion blocks for concrete fixes.
            Flag blockers vs nice-to-haves clearly.
